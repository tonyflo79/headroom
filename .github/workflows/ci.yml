name: CI

on:
  pull_request:
  push:
    branches: [master]

permissions:
  contents: read

jobs:
  engine:
    name: Python engine (3.13 / Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8.3.2
        with:
          version: "0.11.29"
          python-version: "3.13.12"
          enable-cache: false
      - name: Verify the single release version
        run: |
          uv run --python 3.13.12 python scripts/release-version.py --check
          uv run --python 3.13.12 python scripts/updater_release.py --check-config
      - name: Compile Python sources
        run: uv run --python 3.13.12 python -m compileall -q headroom
      - name: Run the complete engine suite
        run: >-
          env PATH="$PWD/tests/fixtures/bin:$PATH"
          uv run --python 3.13.12 python -m unittest discover -s tests

  desktop:
    name: Unsigned desktop tracer (macOS)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8.3.2
        with:
          version: "0.11.29"
          python-version: "3.13.12"
          enable-cache: false
      - uses: actions/setup-node@v7
        with:
          node-version: "22"
      - uses: dtolnay/rust-toolchain@1.89.0
        with:
          components: rustfmt
      - name: Verify the single release version
        id: release-version
        run: |
          uv run --python 3.13.12 python scripts/release-version.py --check
          echo "version=$(tr -d '[:space:]' < VERSION)" >> "$GITHUB_OUTPUT"
          echo "target=$(rustc --print host-tuple)" >> "$GITHUB_OUTPUT"
      - name: Build and smoke-test the frozen sidecar
        run: scripts/build-desktop-sidecar.sh
      - name: Test the private bridge
        run: uv run --python 3.13.12 python -m unittest tests.test_desktop_bridge
      - name: Install pinned accessibility test dependencies
        run: npm ci --prefix integrations/menubar --ignore-scripts
      - name: Test the frontend state boundary
        run: npm --prefix integrations/menubar test
      - name: Check Rust formatting
        run: cargo fmt --check --manifest-path integrations/menubar/src-tauri/Cargo.toml
      - name: Test the native shell
        run: cargo test --locked --manifest-path integrations/menubar/src-tauri/Cargo.toml
      - name: Build the unsigned app
        working-directory: integrations/menubar
        run: npx --yes @tauri-apps/cli@2.11.4 build --bundles app
      - name: Archive the unsigned tracer
        run: >-
          ditto -c -k --sequesterRsrc --keepParent
          integrations/menubar/src-tauri/target/release/bundle/macos/Headroom.app
          Headroom-${{ steps.release-version.outputs.version }}-${{ steps.release-version.outputs.target }}-unsigned.zip
      - uses: actions/upload-artifact@v7
        with:
          name: Headroom-${{ steps.release-version.outputs.version }}-${{ steps.release-version.outputs.target }}-unsigned
          path: Headroom-${{ steps.release-version.outputs.version }}-${{ steps.release-version.outputs.target }}-unsigned.zip
          if-no-files-found: error

  secrets:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
