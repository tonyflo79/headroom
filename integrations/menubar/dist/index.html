<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="dark" />
    <title>Headroom</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="shell" aria-labelledby="page-title">
      <header class="masthead">
        <div>
          <p class="eyebrow">Desktop tracer</p>
          <h1 id="page-title">Headroom</h1>
          <p id="summary" class="summary" aria-live="polite">Starting the bundled engine…</p>
        </div>
        <span id="engine-badge" class="badge">connecting</span>
      </header>

      <section class="fleet" aria-labelledby="fleet-title">
        <div class="section-heading">
          <h2 id="fleet-title">AI fleet</h2>
          <p id="headline">Waiting for a sanitized snapshot</p>
        </div>
        <div id="accounts" class="accounts" aria-live="polite"></div>
      </section>

      <footer>Bundled engine · private bridge · no localhost server</footer>
    </main>
    <script type="module" src="main.js"></script>
  </body>
</html>
